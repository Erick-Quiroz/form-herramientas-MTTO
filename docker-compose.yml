version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mantimiento-db
    environment:
      POSTGRES_USER: Mantimiento
      POSTGRES_PASSWORD: Mantimiento
      POSTGRES_DB: Mantimiento
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U Mantimiento" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
